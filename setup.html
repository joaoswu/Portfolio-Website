<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&gt; joao.sw - stats</title>
    <!-- Dynamic Favicon linked to Discord Avatar -->
    <link id="favicon" rel="icon" type="image/png" href="">
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts: Orbitron, Inter, Share Tech Mono (for terminal/HUD) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">

    <!-- Firebase SDK (Compat Version for simple global initialization) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>

    <!-- Seamless Page Transition Script -->
    <script>
        if (sessionStorage.getItem('joao_site_entered')) {
            document.documentElement.classList.add('skip-enter');
        }
    </script>
</head>

<body class="loading">

    <!-- Top Navigation Header -->
    <header id="top-nav" class="top-nav">
        <div class="nav-left">
            <button id="nav-audio-btn" class="nav-icon-btn interactable">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                </svg>
            </button>
        </div>

        <div class="nav-center">
            <div class="nav-logo interactable">
                <div class="logo-icon"></div>
                <span>JOAO.SW</span>
            </div>

            <nav class="nav-links">
                <a href="index.html" class="nav-link interactable">Home</a>
                <a href="about.html" class="nav-link interactable">About</a>
                <a href="stats.html" class="nav-link interactable">Stats</a>
            </nav>
        </div>

        <div class="nav-right">
        </div>
    </header>

    <!-- Custom Cyber Cursor -->
    <div id="cursor" class="cursor">
        <div id="cursor-shape" class="cursor-shape"></div>
    </div>

    <!-- Tactical Targeting Reticle -->
    <div id="target-reticle" class="target-reticle">
        <div class="bracket bracket-tl"></div>
        <div class="bracket bracket-tr"></div>
        <div class="bracket bracket-bl"></div>
        <div class="bracket bracket-br"></div>
    </div>

    <!-- Background Audio -->
    <audio id="bg-music" loop>
        <source src="House Of Balloons.wav" type="audio/wav">
    </audio>

    <!-- Click to Enter Screen -->
    <div id="enter-screen" class="enter-screen">
        <div class="enter-content">
            <div class="glitch-text" id="loading-text" data-text="WELCOME">WELCOME</div>

            <div class="progress-container" id="progress-container"
                style="display: none; opacity: 0; transition: opacity 0.5s;">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <button id="enter-btn" class="enter-btn interactable">[ ENTER ]</button>
            <button id="optimize-btn" class="optimize-btn interactable">[ OPTIMIZE : OFF ]</button>
        </div>
    </div>

    <!-- Scenery Overlays -->
    <div class="scanlines"></div>
    <div class="background-grid"></div>

    <!-- Interactive Particle Network -->
    <canvas id="network-canvas"></canvas>

    <!-- Q&A Sidebar (Desktop Only) -->
    <div id="qa-trigger" class="qa-trigger interactable">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
            <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
    </div>
    <aside id="qa-sidebar" class="qa-sidebar">
        <div class="qa-header">
            <h3>Ask me anything</h3>
            <p>100% Anonymous.</p>
        </div>
        <form id="qa-form" class="qa-form">
            <div class="input-group">
                <input type="text" id="qa-name" placeholder="Username (Optional)" autocomplete="off">
            </div>
            <div class="input-group">
                <textarea id="qa-question" placeholder="Type your question here..." required></textarea>
            </div>
            <button type="submit" id="qa-submit" class="interactable">Send Message</button>
            <div id="qa-status" class="qa-status"></div>
        </form>
    </aside>

    <!-- Customization Settings Sidebar (Desktop Only) -->
    <div id="settings-trigger" class="settings-trigger interactable">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </div>
    <aside id="settings-sidebar" class="settings-sidebar">
        <div class="settings-header">
            <h3>Theme Settings</h3>
            <p>Customize your dashboard.</p>
        </div>
        <div class="settings-body">
            <div class="color-picker-group">
                <label for="color-bg">Background</label>
                <input type="color" id="color-bg" value="#050505">
            </div>
            <div class="color-picker-group">
                <label for="color-card-bg">Card Background</label>
                <input type="color" id="color-card-bg" value="#ffffff">
                <!-- Stored as rgba in JS, this is just for the picker UI -->
            </div>
            <div class="color-picker-group">
                <label for="color-border">Borders & Lines</label>
                <input type="color" id="color-border" value="#ffffff">
            </div>
            <div class="color-picker-group">
                <label for="color-text-primary">Primary Text</label>
                <input type="color" id="color-text-primary" value="#ffffff">
            </div>

            <div class="settings-actions">
                <button id="reset-theme-btn" class="interactable">Reset to Default</button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="container setup-container">

        <section id="setup-section" class="extended-content"
            style="margin-top: 100px; max-width: 1000px; width: 100%; border: none;">
            <h2 class="section-title" style="margin-bottom: 40px;">My PC Setup</h2>
            <div class="bento-grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">

                <a href="https://www.google.com/search?q=INTEL+CORE+i9-14900K" target="_blank"
                    class="bento-item profile-card interactable" style="text-decoration: none; padding: 25px;">
                    <h3
                        style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px;">
                        Processor</h3>
                    <p style="color: var(--text-primary); font-family: var(--font-heading); font-size: 1.4rem;">INTEL
                        CORE i9-14900K</p>
                </a>

                <a href="https://www.google.com/search?q=RTX+4070" target="_blank"
                    class="bento-item profile-card interactable" style="text-decoration: none; padding: 25px;">
                    <h3
                        style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px;">
                        Graphics Card</h3>
                    <p style="color: var(--text-primary); font-family: var(--font-heading); font-size: 1.4rem;">NVIDIA
                        RTX 4070</p>
                </a>

                <a href="https://www.google.com/search?q=32GB+DDR5+RAM" target="_blank"
                    class="bento-item profile-card interactable" style="text-decoration: none; padding: 25px;">
                    <h3
                        style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px;">
                        Memory</h3>
                    <p style="color: var(--text-primary); font-family: var(--font-heading); font-size: 1.4rem;">32GB
                        DDR5 RAM</p>
                </a>

                <a href="https://www.google.com/search?q=900W+PSU" target="_blank"
                    class="bento-item profile-card interactable" style="text-decoration: none; padding: 25px;">
                    <h3
                        style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px;">
                        Power Supply</h3>
                    <p style="color: var(--text-primary); font-family: var(--font-heading); font-size: 1.4rem;">900W PSU
                    </p>
                </a>

                <a href="https://www.google.com/search?q=5TB+SSD" target="_blank"
                    class="bento-item profile-card interactable" style="text-decoration: none; padding: 25px;">
                    <h3
                        style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px;">
                        Storage</h3>
                    <p style="color: var(--text-primary); font-family: var(--font-heading); font-size: 1.4rem;">5TB SSD
                    </p>
                </a>

                <div class="bento-item profile-card interactable"
                    style="text-decoration: none; padding: 25px; display: flex; align-items: center; justify-content: center; border: 1px dashed rgba(255,255,255,0.2);">
                    <p style="color: var(--text-secondary); font-family: var(--font-mono); font-size: 1rem;">MORE COMING
                        SOON...</p>
                </div>

            </div>
        </section>

    </main>

    <canvas id="music-visualizer"></canvas>
    <script src="script.js"></script>
</body>

</html>
