<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&gt; joao.sw - stats</title>
    <!-- Dynamic Favicon linked to Discord Avatar -->
    <link id="favicon" rel="icon" type="image/png" href="">
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts: Orbitron, Inter, Share Tech Mono (for terminal/HUD) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">

    <!-- Firebase SDK (Compat Version for simple global initialization) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>

    <!-- Seamless Page Transition Script -->
    <script>
        if (sessionStorage.getItem('joao_site_entered')) {
            document.documentElement.classList.add('skip-enter');
        }
    </script>
</head>

<body class="loading">

    <!-- Top Navigation Header -->
    <header id="top-nav" class="top-nav">
        <div class="nav-left">
            <button id="nav-audio-btn" class="nav-icon-btn interactable">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                </svg>
            </button>
        </div>

        <div class="nav-center">
            <div class="nav-logo interactable">
                <div class="logo-icon"></div>
                <span>JOAO.SW</span>
            </div>

            <nav class="nav-links">
                <a href="index.html" class="nav-link interactable">Home</a>
                <a href="about.html" class="nav-link interactable">About</a>
                <a href="stats.html" class="nav-link interactable active">Stats</a>
            </nav>
        </div>

        <div class="nav-right">
        </div>
    </header>

    <!-- Custom Cyber Cursor -->
    <div id="cursor" class="cursor">
        <div id="cursor-shape" class="cursor-shape"></div>
    </div>

    <!-- Tactical Targeting Reticle -->
    <div id="target-reticle" class="target-reticle">
        <div class="bracket bracket-tl"></div>
        <div class="bracket bracket-tr"></div>
        <div class="bracket bracket-bl"></div>
        <div class="bracket bracket-br"></div>
    </div>

    <!-- Background Audio -->
    <audio id="bg-music" loop>
        <source src="House Of Balloons.wav" type="audio/wav">
    </audio>

    <!-- Click to Enter Screen -->
    <div id="enter-screen" class="enter-screen">
        <div class="enter-content">
            <div class="glitch-text" id="loading-text" data-text="WELCOME">WELCOME</div>

            <div class="progress-container" id="progress-container"
                style="display: none; opacity: 0; transition: opacity 0.5s;">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <button id="enter-btn" class="enter-btn interactable">[ ENTER ]</button>
            <button id="optimize-btn" class="optimize-btn interactable">[ OPTIMIZE : OFF ]</button>
        </div>
    </div>

    <!-- Scenery Overlays -->
    <div class="scanlines"></div>
    <div class="background-grid"></div>

    <!-- Interactive Particle Network -->
    <canvas id="network-canvas"></canvas>

    <!-- Q&A Sidebar (Desktop Only) -->
    <div id="qa-trigger" class="qa-trigger interactable">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
            <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
    </div>
    <aside id="qa-sidebar" class="qa-sidebar">
        <div class="qa-header">
            <h3>Ask me anything</h3>
            <p>100% Anonymous.</p>
        </div>
        <form id="qa-form" class="qa-form">
            <div class="input-group">
                <input type="text" id="qa-name" placeholder="Username (Optional)" autocomplete="off">
            </div>
            <div class="input-group">
                <textarea id="qa-question" placeholder="Type your question here..." required></textarea>
            </div>
            <button type="submit" id="qa-submit" class="interactable">Send Message</button>
            <div id="qa-status" class="qa-status"></div>
        </form>
    </aside>

    <!-- Customization Settings Sidebar (Desktop Only) -->
    <div id="settings-trigger" class="settings-trigger interactable">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </div>
    <aside id="settings-sidebar" class="settings-sidebar">
        <div class="settings-header">
            <h3>Theme Settings</h3>
            <p>Customize your dashboard.</p>
        </div>
        <div class="settings-body">
            <div class="color-picker-group">
                <label for="color-bg">Background</label>
                <input type="color" id="color-bg" value="#050505">
            </div>
            <div class="color-picker-group">
                <label for="color-card-bg">Card Background</label>
                <input type="color" id="color-card-bg" value="#ffffff">
                <!-- Stored as rgba in JS, this is just for the picker UI -->
            </div>
            <div class="color-picker-group">
                <label for="color-border">Borders & Lines</label>
                <input type="color" id="color-border" value="#ffffff">
            </div>
            <div class="color-picker-group">
                <label for="color-text-primary">Primary Text</label>
                <input type="color" id="color-text-primary" value="#ffffff">
            </div>

            <div class="settings-actions">
                <button id="reset-theme-btn" class="interactable">Reset to Default</button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="container stats-container">

        <!-- TikTok Extended Content Section -->
        <section id="tiktok-section"
            style="margin-top: 100px; max-width: 1000px; width: 100%; animation: fadeInPage 0.8s ease forwards;">

            <div style="text-align: center; margin-bottom: 50px; position: relative;">
                <!-- Animated Background Glow -->
                <div
                    style="position: absolute; top: 50%; left: 50%; width: 300px; height: 100px; background: radial-gradient(ellipse, rgba(255,255,255,0.05) 0%, transparent 70%); transform: translate(-50%, -50%); pointer-events: none;">
                </div>
                <h2
                    style="font-family: var(--font-heading); font-size: 3rem; color: var(--text-primary); text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 20px rgba(255,255,255,0.2); margin: 0;">
                    TikTok Analytics</h2>
                <div
                    style="width: 60px; height: 3px; background: var(--text-primary); margin: 20px auto 0; border-radius: 2px; box-shadow: 0 0 10px rgba(255,255,255,0.5);">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px;">

                <!-- Followers Card -->
                <div class="bento-item interactable"
                    style="background: linear-gradient(135deg, rgba(20,20,25,0.8) 0%, rgba(10,10,15,0.9) 100%); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 40px 30px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.4); transition: transform 0.3s ease, box-shadow 0.3s ease;"
                    onmouseover="this.style.transform='translateY(-5px)'; this.style.boxShadow='0 20px 40px rgba(0,0,0,0.6)';"
                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 15px 35px rgba(0,0,0,0.4)';">
                    <div
                        style="position: absolute; top: -20px; right: -20px; width: 100px; height: 100px; background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);">
                    </div>
                    <div
                        style="width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; color: #69C9D0;">
                        <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="8.5" cy="7" r="4"></circle>
                            <line x1="20" y1="8" x2="20" y2="14"></line>
                            <line x1="23" y1="11" x2="17" y2="11"></line>
                        </svg>
                    </div>
                    <span id="tiktok-followers"
                        style="font-family: var(--font-heading); font-size: 3.5rem; color: var(--text-primary); line-height: 1; margin-bottom: 10px; text-shadow: 0 0 15px rgba(255,255,255,0.2);">--</span>
                    <span
                        style="font-family: var(--font-mono); font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px;">Followers</span>
                </div>

                <!-- Total Likes Card -->
                <div class="bento-item interactable"
                    style="background: linear-gradient(135deg, rgba(20,20,25,0.8) 0%, rgba(10,10,15,0.9) 100%); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 40px 30px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.4); transition: transform 0.3s ease, box-shadow 0.3s ease;"
                    onmouseover="this.style.transform='translateY(-5px)'; this.style.boxShadow='0 20px 40px rgba(0,0,0,0.6)';"
                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 15px 35px rgba(0,0,0,0.4)';">
                    <div
                        style="position: absolute; top: -20px; right: -20px; width: 100px; height: 100px; background: radial-gradient(circle, rgba(255,0,80,0.05) 0%, transparent 70%);">
                    </div>
                    <div
                        style="width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; color: #EE1D52;">
                        <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <path
                                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                            </path>
                        </svg>
                    </div>
                    <span id="tiktok-likes"
                        style="font-family: var(--font-heading); font-size: 3.5rem; color: var(--text-primary); line-height: 1; margin-bottom: 10px; text-shadow: 0 0 15px rgba(238,29,82,0.3);">--</span>
                    <span
                        style="font-family: var(--font-mono); font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px;">Total
                        Likes</span>
                </div>

                <!-- Total Videos Card -->
                <div class="bento-item interactable"
                    style="background: linear-gradient(135deg, rgba(20,20,25,0.8) 0%, rgba(10,10,15,0.9) 100%); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 40px 30px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.4); transition: transform 0.3s ease, box-shadow 0.3s ease;"
                    onmouseover="this.style.transform='translateY(-5px)'; this.style.boxShadow='0 20px 40px rgba(0,0,0,0.6)';"
                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 15px 35px rgba(0,0,0,0.4)';">
                    <div
                        style="position: absolute; top: -20px; right: -20px; width: 100px; height: 100px; background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);">
                    </div>
                    <div
                        style="width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; color: var(--text-primary);">
                        <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
                            <line x1="7" y1="2" x2="7" y2="22"></line>
                            <line x1="17" y1="2" x2="17" y2="22"></line>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                            <line x1="2" y1="7" x2="7" y2="7"></line>
                            <line x1="2" y1="17" x2="7" y2="17"></line>
                            <line x1="17" y1="17" x2="22" y2="17"></line>
                            <line x1="17" y1="7" x2="22" y2="7"></line>
                        </svg>
                    </div>
                    <span id="tiktok-videos"
                        style="font-family: var(--font-heading); font-size: 3.5rem; color: var(--text-primary); line-height: 1; margin-bottom: 10px; text-shadow: 0 0 15px rgba(255,255,255,0.2);">--</span>
                    <span
                        style="font-family: var(--font-mono); font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px;">Total
                        Videos</span>
                </div>
            </div>

            <div style="text-align: center; margin-top: 50px;">
                <a href="https://www.tiktok.com/@joao.sw" target="_blank" class="interactable"
                    style="display: inline-flex; align-items: center; gap: 10px; padding: 15px 35px; background: transparent; color: var(--text-primary); border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; font-family: var(--font-mono); font-size: 0.95rem; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; transition: all 0.3s ease;"
                    onmouseover="this.style.background='rgba(255,255,255,0.1)'; this.style.borderColor='rgba(255,255,255,0.4)'; this.style.transform='scale(1.05)';"
                    onmouseout="this.style.background='transparent'; this.style.borderColor='rgba(255,255,255,0.2)'; this.style.transform='scale(1)';">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                    View Official Profile
                </a>
            </div>

        </section>

    </main>

    <canvas id="music-visualizer"></canvas>
    <script src="script.js"></script>
</body>

</html>
